name: Release Obsidian Plugin
# Controls when the action will run. Workflow runs when manually triggered using the UI
# or API.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version or major, minor, patch'
        default: 'patch'
        required: true
      update_manifest:
        description: 'Update manifest.json'
        default: true
        required: true
        type: boolean
      update_brat:
        description: 'Update brat manifest'
        default: true
        required: true
        type: boolean

env:
  GH_BOT_EMAIL: "41898282+github-actions[bot]@users.noreply.github.com"
  GH_BOT_NAME: "GitHub Action"
  ZIP_ARTIFACT: slides-extended.zip

jobs:
  build:
    permissions:
      contents: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # persist-credentials required: this step pushes commits and tags
      # zizmor: ignore[artipacked]
      with:
        fetch-depth: 0 # otherwise, you will failed to push refs to dest repo
        submodules: true

    - uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
      with:
        version: 11

    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        cache: "pnpm"

    # Build the plugin
    - name: Build and Tag
      id: build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUT_VERSION: ${{ github.event.inputs.version }}
        INPUT_UPDATE_MANIFEST: ${{ github.event.inputs.update_manifest }}
        INPUT_UPDATE_BRAT: ${{ github.event.inputs.update_brat }}
      run: |
        echo "version: $INPUT_VERSION"
        echo "update_manifest: $INPUT_UPDATE_MANIFEST"
        echo "update_brat: $INPUT_UPDATE_BRAT"

        git config user.name "$GH_BOT_NAME"
        git config user.email "$GH_BOT_EMAIL"

        pnpm install --frozen-lockfile

        npm version "$INPUT_VERSION" --no-git-tag-version
        VERSION=$(grep '"version"' package.json | head -1 | cut -d'"' -f4)
        echo "version $VERSION"

        if git rev-parse "refs/tags/$VERSION" > /dev/null 2>&1; then
          echo "🛑 Tag $VERSION already exists. Delete the release and tag manually, then re-run."
          exit 1
        fi

        if [ "$INPUT_UPDATE_MANIFEST" = "true" ]; then
          # shellcheck disable=SC2086
          sed -i 's|\(version":\) "[0-9\.]*"|\1 "'$VERSION'"|' manifest.json
        fi
        if [ "$INPUT_UPDATE_BRAT" = "true" ]; then
          # shellcheck disable=SC2086
          sed -i 's|\(version":\) "[0-9\.]*"|\1 "'$VERSION'"|' manifest-beta.json
        fi

        git add .
        git status
        git commit -m "🔖 $VERSION"
        git push

        git tag "$VERSION"
        git push --tags

        npm run brat-notes -- "${VERSION}"
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    # Build reveal-dist submodule and tag it at the same version
    - name: Build and Tag reveal-dist
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_VERSION: ${{ steps.build.outputs.version }}
      run: |
        cd reveal-dist
        pnpm install --frozen-lockfile
        pnpm build
        git config user.name "$GH_BOT_NAME"
        git config user.email "$GH_BOT_EMAIL"
        git tag "reveal-dist/$RELEASE_VERSION"
        git push origin "reveal-dist/$RELEASE_VERSION"
        cd ..

    # Package the required files into a zip
    - name: Package
      run: |
        cp ./build/main.js ./build/styles.css .
        mkdir tmp
        cp -r ./reveal-dist/build/css ./reveal-dist/build/dist ./reveal-dist/build/plugin ./reveal-dist/build/template distVersion.json tmp/
        cd tmp
        zip -r "../${ZIP_ARTIFACT}" ./*
        cd ..


    # Attest build provenance for release artifacts
    - name: Attest build artifacts
      uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26  # v4.1.0
      with:
        subject-path: |
          ${{ env.ZIP_ARTIFACT }}
          ./main.js
          ./styles.css

    # Create the release on github
    - name: Create Release
      id: create_release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        INPUT_UPDATE_MANIFEST: ${{ github.event.inputs.update_manifest }}
        RELEASE_VERSION: ${{ steps.build.outputs.version }}
      run: |
        prerelease=true
        if [ "$INPUT_UPDATE_MANIFEST" = "true" ]; then
            prerelease=false
        fi

        gh release create "$RELEASE_VERSION" \
            -F ./release-notes.md \
            --title "$RELEASE_VERSION" \
            --verify-tag \
            --prerelease=${prerelease} \
            "${ZIP_ARTIFACT}" \
            './main.js' \
            './styles.css' \
            './manifest.json' \
            './manifest-beta.json'
