name: Update docs

on:
  workflow_dispatch:
  push:
    branches:
      - docs
    paths:
      - "docs/**"

permissions: read-all

jobs:
  bump:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/docs' && github.repository == 'ebullient/obsidian-slides-extended'
    steps:
      - name: Bump website
        env:
          GH_TOKEN: ${{ secrets.EBULLIENT_PAT }}
        run: |
          gh workflow run -R ebullient/ebullient.github.io gh-pages.yml
